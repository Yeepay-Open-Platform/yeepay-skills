# 易宝支付 API curl 清单
#
# 用途：Skill 不再内置接口静态文档；Agent 按本清单的 doc_md 用 curl 实时拉取最新接口规格。
#
# 【关键】真正可 curl 的数据源（实测确认）：
#   - 接口在线文档（markdown，单文件含：基本信息/请求参数/请求示例/响应参数/响应示例/错误码/示例代码）：
#       https://open.yeepay.com/docs-v3/api/{slug}.md
#     slug 推导规则：{method小写}_{path去掉开头/并把 / 换成 _}（保留 . 与 -）
#       例：POST /rest/v2.0/aggpay/wechat-config/add
#           -> post_rest_v2.0_aggpay_wechat-config_add
#     例外：个别接口（如 yos 账单下载类）前缀为 options_，本清单的 doc_md 字段已逐个实测，
#           直接使用 doc_md，不要自行推导；推导 404/403 时再试 options_ 前缀。
#   - 结果通知（SPI）文档（markdown）：
#       https://open.yeepay.com/docs-v3/notify/{spi}.md
#
# 注意：
#   * 人类可读页 https://open.yeepay.com/docs/products/{product}/api/{uri} 是 SPA，
#     curl 只返回前端外壳，**不可**用于取字段；仅作给人看的链接。
#   * api_id 为全局唯一标识，可在 doc_md「基本信息」中核对，用于回复中标注。
#   * notify_spi 仅为索引提示；实现回调时 MUST 先 curl 接口 doc_md，从「结果通知」节取通知编码与 notify 文档 URL（以 doc_md 为准）。

# 版本以 SKILL.md frontmatter 为准（单一来源）；本字段由发版时同步，validate_docs.py 校验一致性。
version: "1.0.0"

url_templates:
  doc_md:     "https://open.yeepay.com/docs-v3/api/{slug}.md"                     # 主：实现/核对字段必拉（含错误码/示例代码）
  human_page: "https://open.yeepay.com/docs/products/{product}/api/{uri}"         # 仅人类参考(SPA)
  notify_md:  "https://open.yeepay.com/docs-v3/notify/{spi}.md"                   # 结果通知文档

default_product: fwssfk   # 人类页默认产品；按商户方案可换 bzshsfk/ptssfk/dlssfk

gateway:
  openapi: "https://openapi.yeepay.com/yop-center"
  yos: "https://yos.yeepay.com/yop-center"
  sandbox: "https://sandbox.yeepay.com/yop-center"   # 沙箱统一网关（含原 yos 类上传/下载）

